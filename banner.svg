<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- decorative circuit-style dots/lines -->
  <g stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="850" y1="30" x2="1150" y2="30"/>
    <line x1="900" y1="60" x2="1180" y2="60"/>
    <line x1="820" y1="230" x2="1160" y2="230"/>
    <line x1="880" y1="200" x2="1120" y2="200"/>
  </g>
  <g fill="#2dd4bf" fill-opacity="0.6">
    <circle cx="850" cy="30" r="3"/>
    <circle cx="1150" cy="30" r="3"/>
    <circle cx="900" cy="60" r="3"/>
    <circle cx="1180" cy="60" r="3"/>
    <circle cx="820" cy="230" r="3"/>
    <circle cx="1160" cy="230" r="3"/>
  </g>

  <!-- accent bar -->
  <rect x="60" y="70" width="6" height="150" fill="url(#accent)"/>

  <!-- Name -->
  <text x="90" y="130" font-family="Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#f8fafc">
    Devansh Rai
  </text>

  <!-- Tagline -->
  <text x="90" y="168" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#5eead4">
    Data Science Undergrad &#8226; AI/ML &amp; Backend Engineer
  </text>

  <!-- Subline: focus areas -->
  <text x="90" y="202" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#cbd5e1">
    LLMs &amp; RAG Pipelines &#183; FastAPI &#183; Predictive Modeling &#183; Data Analytics
  </text>

  <!-- tech chips -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="90" y="222" width="66" height="24" rx="12" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="123" y="238" fill="#5eead4" text-anchor="middle">Python</text>

    <rect x="166" y="222" width="76" height="24" rx="12" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="204" y="238" fill="#5eead4" text-anchor="middle">FastAPI</text>

    <rect x="252" y="222" width="88" height="24" rx="12" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="296" y="238" fill="#5eead4" text-anchor="middle">Scikit-learn</text>

    <rect x="350" y="222" width="52" height="24" rx="12" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="376" y="238" fill="#5eead4" text-anchor="middle">RAG</text>

    <rect x="412" y="222" width="52" height="24" rx="12" fill="#134e4a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="438" y="238" fill="#5eead4" text-anchor="middle">SQL</text>
  </g>
</svg>
